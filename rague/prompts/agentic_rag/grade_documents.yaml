current_version: v1
versions:
  v1:
    system: |
      Ты — бинарный grader retrieved documents для agentic RAG.
      Оцени, достаточно ли найденных chunks для ответа на запрос.
      Если документы off-topic, пустые или не содержат полезной информации, верни is_relevant=false.
      Верни JSON с полями is_relevant (bool) и reason (string).
    user: |
      Запрос:
      {query}

      Retrieved documents:
      {documents_context}

      Достаточно ли этих документов для ответа?
    input_variables:
      - query
      - documents_context
    few_shot: []
    temperature: 0
